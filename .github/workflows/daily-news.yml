name: Daily AI Engineering News

on:
  schedule:
    # 每天早上9点 (北京时间 9:00 UTC+8 = 1:00 UTC)
    - cron: '0 1 * * *'
  workflow_dispatch:
    # 支持手动触发

jobs:
  analyze-and-report:
    name: Analyze Top 3 AI Engineering News
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: pip install PyYAML>=6.0 requests>=2.31.0

      - name: Run daily news analysis
        env:
          # 开放AI API配置（通过 Secrets）
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          python3 daily-news/daily_news_task.py

      - name: Upload report artifact
        uses: actions/upload-artifact@v4
        with:
          name: daily-report
          path: daily-news/report_*.md

      - name: Create PR for optimizations
        if: github.event_name == 'schedule'
        run: |
          # 检查是否有优化建议需要用户确认
          REPORT_FILE=$(ls -t daily-news/report_*.md | head -1)
          if [ -f "$REPORT_FILE" ]; then
            echo "报告已生成: $REPORT_FILE"
            # TODO: 通过 GitHub Issue 或 PR 创建优化建议
            # 当前通过 artifact 提供报告下载
          fi

      - name: Notify completion
        run: |
          echo "✅ 每日资讯分析完成"
          echo "📊 报告文件: daily-news/report_$(date +%Y-%m-%d).md"
